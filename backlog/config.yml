project_name: "Portfolio Backend"
default_status: "To Do"
statuses: ["To Do", "In Progress", "Done"]
labels: []
definition_of_done: ["Code follows Go idiomatic practices", "Changes are verified with tests (when applicable)", "All TODOs addressed or tracked", "Clean build and no lint errors"]
date_format: yyyy-mm-dd
max_column_width: 20
auto_open_browser: true
default_port: 6420
remote_operations: true
auto_commit: false
bypass_git_hooks: false
check_active_branches: true
active_branch_days: 30
task_prefix: "PRTFL"
