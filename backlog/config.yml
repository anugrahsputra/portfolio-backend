project_name: "Portfolio Backend"
default_status: "To Do"
statuses: ["To Do", "In Progress", "Done"]
labels: []
definition_of_done:
  [
    "Code follows Go idiomatic practices",
    "Changes are verified with tests (when applicable)",
    "All TODOs addressed or tracked",
    "Clean build and no lint errors",
  ]
date_format: yyyy-mm-dd
max_column_width: 20
default_editor: "nvim"
auto_open_browser: true
default_port: 6420
remote_operations: false
auto_commit: false
zero_padded_ids: 3
bypass_git_hooks: false
check_active_branches: false
active_branch_days: 30
task_prefix: "PRTFL"
