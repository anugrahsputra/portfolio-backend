version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/queries"
    schema: "sql/schema"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "pg_catalog.numeric"
            go_type: "float64"
          - db_type: "pg_catalog.numeric"
            go_type: "float64"
            nullable: true
          - db_type: "text"
            go_type: "string"
          - db_type: "text"
            go_type: "string"
            nullable: true
          - db_type: "pg_catalog.text"
            go_type: "string"
          - db_type: "pg_catalog.text"
            go_type: "string"
            nullable: true
          - db_type: "pg_catalog.bool"
            go_type: "bool"
            nullable: true
plugins: []
rules: []
options: {}
